server:
  port: 8080

spring:
  application:
    name: ad-insights

  data:
    redis:
      host: ${ELASTICACHE_HOST:localhost}
      port: ${ELASTICACHE_PORT:6379}
      ssl:
        enabled: ${ELASTICACHE_SSL:false}

  datasource:
    url: ${SNOWFLAKE_URL:jdbc:snowflake://account.region.snowflakecomputing.com/?db=ANALYTICS&schema=PUBLIC&warehouse=COMPUTE_WH}
    username: ${SNOWFLAKE_USER:demo}
    password: ${SNOWFLAKE_PASSWORD:demo}
    driver-class-name: net.snowflake.client.jdbc.SnowflakeDriver

aws:
  region: ${AWS_REGION:ap-south-1}
  dynamodb:
    metrics-table: ${DYNAMODB_METRICS_TABLE:ad-insights-metrics}

ad-insights:
  routing:
    realtime-window-minutes: ${REALTIME_WINDOW_MINUTES:120}
    snowflake-window-days: ${SNOWFLAKE_WINDOW_DAYS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      redisCB:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      dynamoCB:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      snowflakeCB:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s

  retry:
    instances:
      redisRetry:
        maxAttempts: 3
        waitDuration: 200ms
      dynamoRetry:
        maxAttempts: 2
        waitDuration: 300ms
      snowflakeRetry:
        maxAttempts: 2
        waitDuration: 500ms

  bulkhead:
    instances:
      redisBulkhead:
        maxConcurrentCalls: 50
        maxWaitDuration: 50ms
      dynamoBulkhead:
        maxConcurrentCalls: 30
        maxWaitDuration: 100ms
      snowflakeBulkhead:
        maxConcurrentCalls: 10
        maxWaitDuration: 200ms

springdoc:
  swagger-ui:
    path: /swagger-ui.html